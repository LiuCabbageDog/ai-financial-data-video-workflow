<!doctype html>
<!-- Local operator console for upload, review, retry, observability, and final output. -->
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Financial Video Workflow</title>
<style>body{font:15px system-ui;margin:0;background:#f5f6f4;color:#172018}main{max-width:960px;margin:32px auto;padding:0 20px}section{background:#fff;border:1px solid #dfe5dc;border-radius:12px;padding:20px;margin:16px 0}label{display:block;font-weight:650;margin:12px 0 5px}input,textarea,select{box-sizing:border-box;width:100%;padding:10px;border:1px solid #bdc8b8;border-radius:8px}textarea{min-height:90px}button{background:#65a30d;color:#fff;border:0;border-radius:8px;padding:11px 18px;font-weight:700;cursor:pointer;margin:4px}.secondary{background:#526052}.danger{background:#a33}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}pre{white-space:pre-wrap;background:#121812;color:#b7f47b;padding:14px;border-radius:8px;max-height:360px;overflow:auto}.badge{display:inline-block;padding:3px 8px;border-radius:20px;background:#e8f5d8}video{width:100%;margin-top:12px}@media(max-width:650px){.grid{grid-template-columns:1fr}}</style></head>
<body><main><h1>AI 财经视频工作流</h1><p>本地控制台：上传财报、审核中间产物、Scene 重试并查看最终视频。</p>
<section><div class="grid"><div><label>财报 PDF</label><input id="report" type="file" accept="application/pdf"></div><div><label>Transcript 模式</label><select id="mode"><option value="generate">generate</option><option value="pre-written">pre-written</option></select></div></div><label>主题</label><input id="topic" value="英伟达最新财报速览"><label>目标时长（秒）</label><input id="duration" type="number" min="15" max="600" value="70"><label>预写 Transcript</label><textarea id="transcript"></textarea><label>免责声明</label><textarea id="disclaimer">本视频仅供信息与产品演示用途，不构成投资建议。历史表现不代表未来结果，投资涉及风险。</textarea><button id="run">创建任务</button> <span id="status" class="badge">idle</span></section>
<section id="review" hidden><h2>人工审核</h2><p id="reviewNode"></p><div id="reviewSummary" class="badge"></div><button id="approve">批准并继续</button><button id="reject" class="danger">拒绝</button><pre id="reviewArtifact"></pre></section>
<section><h2>任务与产物</h2><pre id="result">等待创建任务…</pre><div id="retry" hidden><input id="sceneId" placeholder="Scene ID，例如 s2"><button id="retryButton" class="secondary">重试 Scene</button></div><video id="video" controls hidden></video></section>
<script>
/** Minimal DOM selector. */ const $=selector=>document.querySelector(selector);
let jobId=null,pollTimer=null;
/** Upload the selected report before creating a workflow job. */
async function uploadReport(){const file=$('#report').files[0];if(!file)throw new Error('请选择财报 PDF');const form=new FormData();form.append('report',file);const response=await fetch('/api/uploads',{method:'POST',body:form});const body=await response.json();if(!response.ok)throw new Error(body.detail||'上传失败');return body.path}
/** Keep one idempotency key for the active click sequence, including accidental double-clicks. */
function newActiveKey(){const key=crypto.randomUUID();sessionStorage.setItem('active-idempotency-key',key);return key}
/** Create a job from the form and begin polling its durable state. */
async function createJob(){try{$('#run').disabled=true;const requestKey=newActiveKey();const reportPath=await uploadReport();const mode=$('#mode').value;const body={source_materials:{financial_reports:[reportPath],disclaimer:$('#disclaimer').value},content_requirements:{topic:$('#topic').value,target_duration_seconds:+$('#duration').value},transcript:{mode,text:mode==='pre-written'?$('#transcript').value:null,allow_editing:true,language:'zh-CN'}};const response=await fetch('/api/jobs',{method:'POST',headers:{'content-type':'application/json','Idempotency-Key':requestKey},body:JSON.stringify(body)});const result=await response.json();if(!response.ok)throw new Error(result.detail||'创建失败');jobId=result.job_id;pollTimer=setInterval(pollJob,900);await pollJob()}catch(error){sessionStorage.removeItem('active-idempotency-key');$('#result').textContent=String(error);$('#run').disabled=false}}
/** Display state and expose review, retry, artifacts, and the completed video. */
async function pollJob(){if(!jobId)return;const response=await fetch(`/api/jobs/${jobId}`);const job=await response.json();$('#status').textContent=job.status;$('#result').textContent=JSON.stringify(job,null,2);$('#retry').hidden=!['completed','failed'].includes(job.status);if(job.status==='waiting_review'){clearInterval(pollTimer);$('#review').hidden=false;$('#reviewNode').textContent=`请审核：${job.current_node}`;const [artifact,summaryResponse]=await Promise.all([fetch(`/api/jobs/${jobId}/artifacts/${job.current_node}.json`),fetch(`/api/jobs/${jobId}/artifacts/review_summary.json`)]);$('#reviewArtifact').textContent=await artifact.text();if(summaryResponse.ok){const s=await summaryResponse.json();$('#reviewSummary').textContent=`数据视觉 ${Math.round(s.data_visual_coverage*100)}% · 图表 ${s.chart_count} · 指标卡 ${s.metric_card_count} · B-roll ${s.broll_count} · 预计音频 ${s.estimated_audio_seconds}s`}}if(['completed','failed','blocked_conflict'].includes(job.status)){clearInterval(pollTimer);sessionStorage.removeItem('active-idempotency-key');$('#run').disabled=false;if(job.status==='completed'){$('#video').src=`/api/jobs/${jobId}/artifacts/final.mp4`;$('#video').hidden=false}}}
/** Persist a review decision and resume polling after approval. */
async function decide(decision){const node=$('#status').textContent==='waiting_review'?JSON.parse($('#result').textContent).current_node:null;if(!node)return;await fetch(`/api/jobs/${jobId}/reviews/${node}/${decision}`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({note:''})});$('#review').hidden=true;if(decision==='approve'){pollTimer=setInterval(pollJob,900);await pollJob()}}
/** Request real scene-scoped downstream regeneration. */
async function retryScene(){const scene=$('#sceneId').value.trim();if(!scene)return;await fetch(`/api/jobs/${jobId}/scenes/${scene}/retry`,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({reason:'operator retry',overrides:{}})});pollTimer=setInterval(pollJob,900);await pollJob()}
$('#run').onclick=createJob;$('#approve').onclick=()=>decide('approve');$('#reject').onclick=()=>decide('reject');$('#retryButton').onclick=retryScene;
</script></body></html>
