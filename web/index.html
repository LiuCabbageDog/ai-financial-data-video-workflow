<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Financial Video Workflow</title>
<style>body{font:15px system-ui;margin:0;background:#f5f6f4;color:#172018}main{max-width:960px;margin:32px auto;padding:0 20px}section{background:#fff;border:1px solid #dfe5dc;border-radius:12px;padding:20px;margin:16px 0}h1{margin-bottom:4px}label{display:block;font-weight:650;margin:12px 0 5px}input,textarea,select{box-sizing:border-box;width:100%;padding:10px;border:1px solid #bdc8b8;border-radius:8px}textarea{min-height:100px}button{background:#65a30d;color:#fff;border:0;border-radius:8px;padding:11px 18px;font-weight:700;cursor:pointer}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}pre{white-space:pre-wrap;background:#121812;color:#b7f47b;padding:14px;border-radius:8px;min-height:80px}.hint{color:#60705e}.badge{display:inline-block;padding:3px 8px;border-radius:20px;background:#e8f5d8}@media(max-width:650px){.grid{grid-template-columns:1fr}}</style></head>
<body><main><h1>AI 财经视频工作流</h1><p class="hint">本地演示控制台 · NVIDIA Q1 FY2027</p><section><div class="grid"><div><label>财报文件名</label><input value="nvidia_q1_fy27_official.pdf" disabled></div><div><label>Transcript 模式</label><select id="mode"><option value="generate">generate</option><option value="pre-written">pre-written</option></select></div></div><label>主题</label><input id="topic" value="英伟达 2027 财年第一季度业绩速览"><label>目标时长（秒）</label><input id="duration" type="number" value="70"><label>预写 Transcript（仅 pre-written）</label><textarea id="transcript" placeholder="留空即由系统生成"></textarea><label>免责声明</label><textarea id="disclaimer">本视频仅供信息与产品演示用途，不构成投资建议。历史表现不代表未来结果，投资涉及风险。</textarea><p><button id="run">创建任务</button> <span id="status" class="badge">idle</span></p></section><section><h2>任务与产物</h2><pre id="result">等待创建任务…</pre></section></main>
<script>const $=x=>document.querySelector(x); $('#run').onclick=async()=>{const mode=$('#mode').value; const body={source_materials:{financial_reports:['nvidia_q1_fy27_official.pdf'],disclaimer:$('#disclaimer').value},content_requirements:{topic:$('#topic').value,target_duration_seconds:+$('#duration').value},transcript:{mode,text:mode==='pre-written'?$('#transcript').value:null,language:'zh-CN'}}; $('#status').textContent='queued'; const r=await fetch('/api/jobs',{method:'POST',headers:{'content-type':'application/json','Idempotency-Key':crypto.randomUUID()},body:JSON.stringify(body)}); const j=await r.json(); if(!r.ok){$('#result').textContent=JSON.stringify(j,null,2);return} const poll=setInterval(async()=>{const x=await (await fetch('/api/jobs/'+j.job_id)).json(); $('#status').textContent=x.status; $('#result').textContent=JSON.stringify(x,null,2); if(['completed','failed','blocked_conflict'].includes(x.status))clearInterval(poll)},900)}</script></body></html>
